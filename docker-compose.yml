version: "3.9"

services:
  cers-rapport:
    build: .
    container_name: cers-rapport
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
